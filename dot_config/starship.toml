format = """$container $directory$sudo$cmd_duration$azure$python$rust$git_status$git_metrics$git_branch$fill $username@$hostname - $localip $battery$line_break """

[character]
format = " "

[azure]
disabled = false
format = "[on](bright-purple) [$symbol($username)]($style) "
symbol = "󰠅 "
style = "white"

[cmd_duration]
min_time = 5000
style = 'white'

[directory]
home_symbol = '󱂵 '
style = 'white'

[fill]
symbol = '─'
style = 'white'

[username]
format = ' [$user]($style)'
show_always = true
style_user = 'bright-purple'

[hostname]
format = '[$ssh_symbol$hostname]($style) '
ssh_only = false
style = 'bright-purple'

[localip]
ssh_only = false
disabled = false
style = 'white'

[container]
symbol = "  "
format = '[$symbol]($style)'
style = 'bright-purple'

[git_status]
format = ' ([\[$all_status$ahead_behind\]]($style) )'

[python]
format = " [${symbol}${pyenv_prefix}(${version} )($virtualenv)]($style)"
detect_extensions = ['py', 'ipynb']
style = 'bright-purple'

[sudo]
disabled = false
style = 'bright-purple'

[git_metrics]
disabled = false

[git_branch]
format = " [$symbol$branch]($style) "

[memory_usage]
disabled = false
threshold = -1
format = ' $symbol [${ram}]($style) '
style = 'bright-purple'


[[battery.display]]
threshold = 20
style = 'bold red'

[[battery.display]]
threshold = 40
style = 'bold orange'

[[battery.display]]
threshold = 60
style = 'yellow'

[[battery.display]]
threshold = 100
style = 'green'
